spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/citronix
    username: citronix
    password: citronix
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  docker:
    compose:
      file: src/main/docker/postgresql.yml
      enabled: true
      lifecycle-management: start_only

  liquibase:
    enabled: false