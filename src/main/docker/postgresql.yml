name: citronix
services:
  postgresql:
    image: 'postgres:17'

    environment:
      - 'POSTGRES_DB=citronix'
      - 'POSTGRES_PASSWORD=citronix'
      - 'POSTGRES_USER=citronix'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U $${POSTGRES_USER}']
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - '5433:5432'

